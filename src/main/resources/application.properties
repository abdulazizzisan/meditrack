spring.application.name=meditrack
spring.profiles.active=dev

spring.datasource.url=jdbc:postgresql://localhost:5432/meditrack
spring.datasource.username=meditrack
spring.datasource.password=meditrack
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.elasticsearch.uris=http://localhost:9200

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2:3b

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

server.servlet.context-path=/api

logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
